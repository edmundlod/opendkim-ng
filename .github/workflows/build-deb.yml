name: Build Debian package

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (tag, branch, or commit)'
        required: true
        default: 'master'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-deb:
    name: Build Debian package
    runs-on: ubuntu-24.04

    container:
      image: debian:12

    permissions:
      contents: write

    steps:
      - name: Install git
        run: |
          apt-get update
          apt-get install -y git ca-certificates

      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install build dependencies
        run: |
          apt-get update

          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            cmake \
            debhelper \
            devscripts \
            dpkg-dev \
            fakeroot \
            equivs \
            pkg-config \
            libssl-dev \
            liblmdb-dev \
            libmilter-dev \
            libunbound-dev \
            liblua5.4-dev \
            libbsd-dev \
            libevent-dev \
            nettle-dev \
            dh-python \
            python3

      - name: Show build environment
        run: |
          uname -a
          cat /etc/os-release
          gcc --version
          cmake --version
          openssl version

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Collect build artifacts
        run: |
          mkdir -p dist

          mv ../*.deb dist/ || true
          mv ../*.changes dist/ || true
          mv ../*.buildinfo dist/ || true

          ls -lah dist/

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          overwrite_files: true
          fail_on_unmatched_files: true
